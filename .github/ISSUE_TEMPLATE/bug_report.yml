name: Bug report
description: Report a reproducible problem in the suite or its generated outputs.
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for reproducible problems. Include the smallest input that shows the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: The installer failed to verify...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: 1. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: GitHub repo, Codex/CLI version, OS, branch, commit SHA, etc.
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, issue links, or file references.

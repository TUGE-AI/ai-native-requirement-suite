name: Feature request
description: Propose an improvement, new capability, or workflow change.
labels: [enhancement, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for scope changes or new capabilities. Keep the request public-safe.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Link to related docs, examples, or previous issues.
